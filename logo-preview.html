<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Logo Alternativen</title>
  <style>
    body {
      background-color: #f5f1ec;
      color: #1f1e1c;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      margin-bottom: 3rem;
    }
    .logos {
      display: flex;
      gap: 4rem;
      align-items: center;
    }
    .logo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .logo-box {
      width: 150px;
      height: 150px;
      padding: 1rem;
      border: 1px solid #ddd8d1;
      border-radius: 12px;
      background: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a89070;
    }
    svg {
      width: 100%;
      height: 100%;
    }
    .label {
      font-size: 0.9rem;
      color: #4a4844;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h1>Logo Alternativen</h1>
  <div class="logos">
    <!-- Option 1: Herz & Hände -->
    <div class="logo-wrapper">
      <div class="logo-box">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 12c1.33 0 2.67.67 4 2 1.33-1.33 2.67-2 4-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 14v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="label">Empathie / Halt</span>
    </div>

    <!-- Option 2: Baum / Blatt Mosaik -->
    <div class="logo-wrapper">
      <div class="logo-box">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Stamm -->
          <path d="M12 22v-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Blätter -->
          <path d="M12 13c-2.5 0-5-2-5-5 0-3 5-6 5-6s5 3 5 6c0 3-2.5 5-5 5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Innere Verzweigung / Puls -->
          <path d="M12 13v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 9c-1.5-1-2.5-3-2.5-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 9c1.5-1 2.5-3 2.5-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="label">Natur / Wachstum</span>
    </div>
  </div>
</body>
</html>
